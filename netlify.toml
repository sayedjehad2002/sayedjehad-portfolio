# Netlify build configuration for the Vite app.
# With this committed, Netlify auto-configures the build (no manual settings needed).
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: every path serves the app (deep links / refresh never 404).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security + privacy headers for all responses.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Vite fingerprints asset filenames, so they can be cached forever.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
